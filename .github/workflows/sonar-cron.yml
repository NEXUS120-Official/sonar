name: SONAR Daily Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sonar-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
      SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Backfill movimenti via Alchemy RPC
        run: |
          node -e "
          const { createClient } = require('@supabase/supabase-js');
          const supabase = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_SERVICE_ROLE_KEY);
          const RPC_URL = 'https://solana-mainnet.g.alchemy.com/v2/P1PXzlfVo6e8HeAAr04UV';
          async function fetchJson(method, params) {
            const res = await fetch(RPC_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ jsonrpc: '2.0', id: 1, method, params })
            });
            return res.json();
          }
          async function main() {
            console.log('Backfill via Alchemy RPC...');
            const { data: whales } = await supabase.from('whales').select('address').eq('is_active', true).limit(10);
            if (!whales || whales.length === 0) { console.log('Nessuna whale trovata'); return; }
            console.log(whales.length + ' whale da controllare');
            let inserted = 0;
            for (const whale of whales) {
              try {
                const sigs = await fetchJson('getSignaturesForAddress', [whale.address, { limit: 10 }]);
                if (!sigs.result || sigs.result.length === 0) continue;
                for (const sig of sigs.result) {
                  if (sig.err) continue;
                  const { count } = await supabase.from('movements').select('*', { count: 'exact', head: true }).eq('signature', sig.signature);
                  if (count && count > 0) continue;
                  const blockTime = sig.blockTime ? new Date(sig.blockTime * 1000).toISOString() : new Date().toISOString();
                  const { error } = await supabase.from('movements').insert({
                    signature: sig.signature, from_address: whale.address, to_address: 'unknown',
                    token: 'SOL', amount_token: 0, amount_usd: 0,
                    flow_type: 'unknown', flow_direction: 'internal', block_time: blockTime
                  });
                  if (!error) inserted++;
                }
                await new Promise(r => setTimeout(r, 200));
              } catch(e) { console.log('Errore: ' + e.message); }
            }
            console.log(inserted + ' nuovi movimenti inseriti');
          }
          main().catch(e => { console.error(e); process.exit(1); });
          "

      - name: Genera segnali multi-soglia
        run: npx tsx scripts/generate-multi-signals.ts

      - name: Summary
        run: echo "✅ SONAR pipeline completata — $(date)"
