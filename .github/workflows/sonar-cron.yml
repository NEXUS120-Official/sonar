name: SONAR Hourly Pipeline (Free Mode)

on:
  schedule:
    - cron: '0 * * * *'   # ogni ora
  workflow_dispatch:       # permette esecuzione manuale

jobs:
  sonar-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 10    # deve finire in fretta per stare nei limiti free

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Backfill recent transactions from active whales
        run: npx tsx scripts/backfill-recent-whale-txs.ts

      - name: Replay raw transactions into movements
        run: npx tsx scripts/sovereign-replay-massive.ts

      - name: Classify movements
        run: node classify-from-db.js

      - name: Update flow snapshot
        run: node recalc-all2.js

      - name: Generate multi-threshold signals

      - name: Detect shadow links (CEX-to-Shadow)

      - name: Detect shadow continuity (Fog-Piercing)

      - name: Detect privacy lifecycle sequences

      - name: Generate intelligence-grade alerts

      - name: Backtest predittivo Shadow Links (solo se ci sono dati)
        run: npx tsx scripts/backtest-shadow-predictions.ts
        run: npx tsx scripts/generate-intelligence-alerts.ts
        run: npx tsx scripts/detect-privacy-sequences.ts
        run: npx tsx scripts/detect-shadow-continuity.ts
        run: npx tsx scripts/detect-shadow-links.ts

      - name: Detect shadow links (CEX-to-Shadow)

      - name: Detect shadow continuity (Fog-Piercing)

      - name: Detect privacy lifecycle sequences

      - name: Generate intelligence-grade alerts

      - name: Backtest predittivo Shadow Links (solo se ci sono dati)
        run: npx tsx scripts/backtest-shadow-predictions.ts
        run: npx tsx scripts/generate-intelligence-alerts.ts
        run: npx tsx scripts/detect-privacy-sequences.ts
        run: npx tsx scripts/detect-shadow-continuity.ts
        run: npx tsx scripts/detect-shadow-links.ts
        run: npx tsx scripts/generate-multi-signals.ts

      - name: Send alerts (Telegram)
        run: npx tsx scripts/send-alerts.ts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Summary
        run: echo "✅ SONAR pipeline completata — $(date)"
