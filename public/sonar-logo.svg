<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- NEXUS exact palette -->
    <linearGradient id="nexusGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#005a61"/>
      <stop offset="100%" stop-color="#4fedf1"/>
    </linearGradient>
    <linearGradient id="nexusGrad2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#005a61" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4fedf1" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="nexusGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#005a61" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4fedf1" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="dotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4fedf1"/>
      <stop offset="100%" stop-color="#2ec4c9"/>
    </linearGradient>
    <linearGradient id="sweepGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4fedf1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#005a61" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ====== WAVE ARCS (3/4 circles, staggered rotation) ====== -->
  
  <!-- Outermost wave arc -->
  <path d="M 256 56 A 200 200 0 1 1 56 256" 
        stroke="url(#nexusGrad3)" stroke-width="2" fill="none" 
        stroke-linecap="round"/>
  
  <!-- Second wave arc -->
  <path d="M 406 256 A 150 150 0 1 1 256 106" 
        stroke="url(#nexusGrad2)" stroke-width="2.5" fill="none" 
        stroke-linecap="round" filter="url(#glow2)"/>
  
  <!-- Third wave arc (strong) -->
  <path d="M 256 156 A 100 100 0 1 1 156 256" 
        stroke="url(#nexusGrad)" stroke-width="3.5" fill="none" 
        stroke-linecap="round" filter="url(#glow1)"/>

  <!-- Inner wave arc -->
  <path d="M 316 256 A 60 60 0 1 1 256 196" 
        stroke="url(#nexusGrad)" stroke-width="3" fill="none" 
        stroke-linecap="round" filter="url(#glow1)" opacity="0.8"/>

  <!-- ====== SWEEP ZONE (detection cone) ====== -->
  <path d="M 256 256 L 186 98 A 185 185 0 0 1 370 130 Z" 
        fill="url(#sweepGrad)"/>

  <!-- Sweep edge line -->
  <line x1="256" y1="256" x2="370" y2="130" 
        stroke="url(#nexusGrad)" stroke-width="1.5" opacity="0.35"/>

  <!-- ====== SIGNAL DOTS (whale detections) ====== -->
  
  <!-- Primary signal (brightest, on arc) -->
  <circle cx="310" cy="130" r="7" fill="url(#dotGrad)" filter="url(#glow1)"/>
  
  <!-- Secondary signal -->
  <circle cx="220" cy="118" r="5.5" fill="url(#dotGrad)" filter="url(#glow3)" opacity="0.75"/>
  
  <!-- Tertiary signal (faintest) -->
  <circle cx="365" cy="195" r="4.5" fill="url(#dotGrad)" filter="url(#glow3)" opacity="0.5"/>

  <!-- ====== CENTER CORE ====== -->
  
  <!-- Outer ring of center -->
  <circle cx="256" cy="256" r="18" fill="none" stroke="url(#nexusGrad)" stroke-width="2" filter="url(#glow1)"/>
  
  <!-- Core fill -->
  <circle cx="256" cy="256" r="10" fill="url(#dotGrad)" filter="url(#glow2)"/>
  
  <!-- Core inner (the "eye") -->
  <circle cx="256" cy="256" r="4" fill="#ffffff" opacity="0.9"/>

  <!-- ====== TICK MARKS (compass/radar feel) ====== -->
  
  <!-- North -->
  <line x1="256" y1="62" x2="256" y2="48" stroke="#4fedf1" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>
  <!-- East -->
  <line x1="450" y1="256" x2="464" y2="256" stroke="#4fedf1" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>
  <!-- South -->
  <line x1="256" y1="450" x2="256" y2="464" stroke="#4fedf1" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>
  <!-- West -->
  <line x1="62" y1="256" x2="48" y2="256" stroke="#4fedf1" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>
  
  <!-- Diagonal ticks (45°) -->
  <line x1="397" y1="115" x2="407" y2="105" stroke="#4fedf1" stroke-width="1" opacity="0.15" stroke-linecap="round"/>
  <line x1="397" y1="397" x2="407" y2="407" stroke="#4fedf1" stroke-width="1" opacity="0.15" stroke-linecap="round"/>
  <line x1="115" y1="397" x2="105" y2="407" stroke="#4fedf1" stroke-width="1" opacity="0.15" stroke-linecap="round"/>
  <line x1="115" y1="115" x2="105" y2="105" stroke="#4fedf1" stroke-width="1" opacity="0.15" stroke-linecap="round"/>

</svg>
